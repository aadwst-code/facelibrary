<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WST Smart Library - เจ้าหน้าที่</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- ใช้ face-api.js เวอร์ชั่นที่เสถียร -->
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  <style>
    body { background-color: #f1f5f9; font-family: 'Sarabun', sans-serif; }
    #video-container { width: 320px; margin: auto; position: relative; }
    video { width: 100%; border-radius: 10px; transform: scaleX(-1); }
  </style>
</head>
<body>

<div class="container mt-5">
  <div class="card p-4 text-center">
    <h3>ระบบสแกนใบหน้า (Fast-Scan)</h3>
    <button class="btn btn-primary my-3" onclick="startScanner()">เปิดกล้อง</button>
    <div id="video-container">
      <video id="webcam" autoplay muted></video>
      <p id="statusText">กำลังโหลดระบบ...</p>
    </div>
  </div>
</div>

<script>
  // 1. ใส่ URL ของคุณครูตรงนี้
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxIGuVepfCibulH0T-EqFVuAxhQGwFslF6ji9Yh-YrESD8U8mm7x--r0C3LjvQ6no-zOQ/exec";

  let faceMatcher = null;
  let isProcessing = false; // 🚀 ตัวล็อคกันสแกนซ้ำ

  async function startScanner() {
    const status = document.getElementById('statusText');
    const video = document.getElementById('webcam');

    // โหลดโมเดล (ครั้งเดียว)
    if (!faceMatcher) {
      status.innerText = "กำลังโหลดโมเดล AI...";
      const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
      await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
      await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
      await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
      
      status.innerText = "กำลังดึงข้อมูลนักเรียน...";
      // โหลดฐานข้อมูลจาก Sheets มาฝังในเครื่อง (ไวมาก)
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getFaceDatabase' }) });
      const db = await res.json();
      
      const labeledDescriptors = db.map(s => new faceapi.LabeledFaceDescriptors(s.id, [new Float32Array(s.descriptor)]));
      faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.45);
      status.innerText = "พร้อมสแกน!";
    }

    const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
    video.srcObject = stream;

    video.addEventListener('play', () => {
      setInterval(async () => {
        // 🚀 ถ้ากำลังประมวลผลอยู่ ให้หยุดรอก่อน (กันสแกนซ้ำ)
        if (isProcessing) return;

        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        
        if (detection) {
          const match = faceMatcher.findBestMatch(detection.descriptor);
          if (match.label !== 'unknown') {
            isProcessing = true; // 🚀 ล็อคระบบ
            status.innerText = "พบ: " + match.label;
            
            // ส่งแค่รหัสนักเรียนไปที่ Sheets
            fetch(GAS_URL, { 
              method: 'POST', 
              body: JSON.stringify({ action: 'handleSmartScan', barcode: match.label, currentMode: 'borrow' }) 
            }).then(() => {
              Swal.fire({ title: 'สำเร็จ!', text: 'บันทึกรายการนักเรียน: ' + match.label, icon: 'success', timer: 2000 });
              // 🚀 ปลดล็อคหลังจาก 7 วินาที
              setTimeout(() => { isProcessing = false; }, 7000);
            });
          }
        }
      }, 500); // เช็คทุกครึ่งวินาที ไม่กระตุก
    });
  }
</script>
</body>
</html>
